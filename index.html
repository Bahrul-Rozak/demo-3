<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent - Workshop 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center h-screen font-sans">

    <div class="w-full max-w-4xl h-[90vh] bg-gray-800 rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-gray-700">
        <div class="p-4 border-b border-gray-700 flex items-center justify-between bg-gray-800/50 backdrop-blur">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center">
                    <i class="fa-solid fa-robot text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg">AI Agent dengan Multi-Tools</h1>
                    <p class="text-xs text-gray-400">Code Execution, File Processing, Web Scraping</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="newConversation()" class="text-sm text-gray-400 hover:text-white">
                    <i class="fa-solid fa-plus"></i> New Chat
                </button>
                <a href="/admin.html" class="text-sm text-purple-400 hover:text-purple-300">
                    <i class="fa-solid fa-gear"></i> Admin
                </a>
            </div>
        </div>

        <div id="chat-area" class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="flex gap-3">
                <div class="w-8 h-8 rounded-full bg-blue-500 flex-shrink-0 flex items-center justify-center">
                    <i class="fa-solid fa-robot text-sm"></i>
                </div>
                <div class="bg-gray-700 rounded-2xl rounded-tl-none p-3 max-w-[80%]">
                    <p class="text-sm">Halo! Saya AI Agent dengan kemampuan multi-tools. Saya bisa:</p>
                    <ul class="text-sm mt-2 space-y-1">
                        <li><i class="fa-solid fa-code text-green-400"></i> Execute JavaScript code</li>
                        <li><i class="fa-solid fa-file-csv text-yellow-400"></i> Parse file CSV/JSON</li>
                        <li><i class="fa-solid fa-globe text-blue-400"></i> Scrape konten website</li>
                    </ul>
                    <p class="text-sm mt-2">Silakan tanya sesuatu atau minta saya melakukan tugas!</p>
                </div>
            </div>
        </div>

        <div class="p-4 border-t border-gray-700 bg-gray-800/50">
            <form id="chat-form" class="flex gap-2">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="Tanya sesuatu atau minta saya execute code..." 
                    class="flex-1 bg-gray-700 text-white rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-400"
                    autocomplete="off"
                >
                <button 
                    type="submit" 
                    class="bg-blue-600 hover:bg-blue-700 text-white rounded-full w-10 h-10 flex items-center justify-center transition-colors"
                >
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chat-area');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        
        let conversationId = generateConversationId();
        let conversationHistory = [];

        function generateConversationId() {
            return 'conv_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        async function loadHistory() {
            try {
                const response = await fetch(`/api/history?conversation_id=${conversationId}`);
                const data = await response.json();
                
                if (data.messages && data.messages.length > 0) {
                    conversationHistory = data.messages;
                    conversationHistory.forEach(msg => {
                        if (msg.role === 'user' || msg.role === 'assistant') {
                            addMessage(msg.role, msg.content, false);
                        }
                    });
                }
            } catch (error) {
                console.error('Failed to load history:', error);
            }
        }

        function addMessage(role, content, save = true) {
            const isUser = role === 'user';
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex gap-3 ${isUser ? 'justify-end' : ''}`;
            
            if (isUser) {
                messageDiv.innerHTML = `
                    <div class="bg-blue-600 rounded-2xl rounded-tr-none p-3 max-w-[80%]">
                        <p class="text-sm">${content}</p>
                    </div>
                    <div class="w-8 h-8 rounded-full bg-gray-600 flex-shrink-0 flex items-center justify-center">
                        <i class="fa-solid fa-user text-sm"></i>
                    </div>
                `;
            } else {
                messageDiv.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-blue-500 flex-shrink-0 flex items-center justify-center">
                        <i class="fa-solid fa-robot text-sm"></i>
                    </div>
                    <div class="bg-gray-700 rounded-2xl rounded-tl-none p-3 max-w-[80%]">
                        <p class="text-sm whitespace-pre-wrap">${content}</p>
                    </div>
                `;
            }
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'loading-indicator';
            loadingDiv.className = 'flex gap-3';
            loadingDiv.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-blue-500 flex-shrink-0 flex items-center justify-center">
                    <i class="fa-solid fa-robot text-sm"></i>
                </div>
                <div class="bg-gray-700 rounded-2xl rounded-tl-none p-3 flex gap-1 items-center">
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                </div>
            `;
            chatArea.appendChild(loadingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeLoading() {
            const loadingDiv = document.getElementById('loading-indicator');
            if (loadingDiv) loadingDiv.remove();
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            addMessage('user', message);
            userInput.value = '';
            addLoading();

            try {
                const response = await fetch('/api/agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message,
                        conversation_id: conversationId
                    })
                });

                const data = await response.json();
                removeLoading();

                if (data.reply) {
                    addMessage('assistant', data.reply);
                    
                    if (data.toolsUsed && data.toolsUsed.length > 0) {
                        const toolsDiv = document.createElement('div');
                        toolsDiv.className = 'flex gap-3 justify-end mt-2';
                        toolsDiv.innerHTML = `
                            <div class="text-xs text-gray-400">
                                <i class="fa-solid fa-wrench"></i> Tools used: ${data.toolsUsed.join(', ')}
                            </div>
                        `;
                        chatArea.appendChild(toolsDiv);
                    }
                } else {
                    addMessage('assistant', 'Error: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                removeLoading();
                addMessage('assistant', 'Error koneksi ke server.');
                console.error(error);
            }
        });

        function newConversation() {
            if (confirm('Mulai percakapan baru? History akan tetap tersimpan.')) {
                conversationId = generateConversationId();
                chatArea.innerHTML = '';
                conversationHistory = [];
                addMessage('assistant', 'Percakapan baru dimulai. Silakan tanya sesuatu!', false);
            }
        }

        loadHistory();
    </script>
</body>
</html>
